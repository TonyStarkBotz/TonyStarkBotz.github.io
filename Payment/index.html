<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DigitalGalaxyHQ Payment</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        .qr-code {
            width: 250px;
            max-width: 100%;
            border-radius: 12px;
            border: 2px solid white;
        }

        #upi-id {
            margin: 20px 0;
            font-size: 1.1rem;
            font-weight: bold;
            color: #38bdf8;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 8px;
        }

        #scan-qr-text {
            color: #cbd5e1;
            margin-bottom: 15px;
        }

        .upi-apps img {
            width: 50px;
            margin: 5px;
            border-radius: 10px;
        }

        .pay-btn {
            display: inline-block;
            margin-top: 20px;
            background: #38bdf8;
            color: #0f172a;
            padding: 12px 25px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .pay-btn:hover {
            background: #0ea5e9;
            transform: translateY(-2px);
        }

        .desktop-note {
            margin-top: 15px;
            color: #94a3b8;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>DigitalGalaxyHQ</h2>

        <a href="../index.html" style="color:#7dd3fc;">
            ← Back to Home
        </a>

        <br><br>

        <img class="qr-code"
            src="https://i.ibb.co/KjpKDNF7/photo-2026-07-07-17-33-12-7659840517605163024.jpg"
            alt="QR Code">

        <div id="upi-id">
            tonystark75@nyes
        </div>

        <p id="scan-qr-text">
            Scan the QR code if the payment button doesn't work
        </p>

        <div class="upi-apps">
            <img src="https://i.ibb.co/VMyq3cS/file-3600.jpg" alt="PhonePe">
            <img src="https://i.ibb.co/kXYcjq1/file-3599.jpg" alt="Paytm">
            <img src="https://i.ibb.co/PCBNShM/file-3598.jpg" alt="GPay">
        </div>

        <!-- FIXED BUTTON -->
        <a id="payment-button"
            class="pay-btn"
            href="upi://pay?pa=tonystark75@nyes&pn=Abhishek&cu=INR">
            Pay Now
        </a>

        <div id="desktop-message" class="desktop-note"></div>

    </div>

    <script>

        const isMobile =
            /Android|iPhone|iPad|iPod|Opera Mini|IEMobile/i
                .test(navigator.userAgent);

        // On desktop show message instead of removing button badly
        if (!isMobile) {

            document.getElementById("payment-button").style.display = "none";

            document.getElementById("desktop-message").innerHTML =
                "Open this page on your phone to use UPI payment button.";
        }

    </script>

</body>

</html>
